<!DOCTYPE html>
<html>
<head>
    <title>This is the Book Search</title>
</head>
<body>

    <h1>Go ahead and look up some books!!</h1>

    <form id="form">
        <p>Please input a book name right here:</p>
        <input type="text" id="input" required>
        <button type="submit">Search</button>
    </form>




    <p id="loading" style="display:none;">
        Books are loading, please wait....
    </p>
    <table id="table" border="1" style="display:none;">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>




<script>
    let form = document.getElementById("form");

    let input = document.getElementById("input");

    let loading = document.getElementById("loading");

    let table = document.getElementById("table");

    let body = document.getElementById("body");

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        table.style.display = "none";
        body.innerHTML = "";

        loading.style.display = "block";

        let name = input.value.split(" ").join("+");

        let res = await fetch(`https://openlibrary.org/search.json?title=${name}`);
        let data = await res.json();

        loading.style.display = "none";

        table.style.display = "table";

        for (let i = 0; i < data.docs.length; i++) {
            let row = document.createElement("tr");

            let title = document.createElement("td");
            title.textContent = data.docs[i].title;

            let author = document.createElement("td");
            if (data.docs[i].author_name) {
                author.textContent = data.docs[i].author_name[0];
            } else {
                author.textContent = "No Answer";
            }

            row.appendChild(title);
            row.appendChild(author);
            body.appendChild(row);
        }
    });




</script>
</body>
</html>
