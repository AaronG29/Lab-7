<!DOCTYPE html>
<html>
<head>
    <title>This is the Book Search</title>
</head>
<body>

    <h1>Go ahead and look up some books!!</h1>

    <form id="form">
        <p>Please input a book name right here:</p>
        <input type="text" id="input" required>
        <button type="submit">Search</button>
    </form>




    <p id="loading" style="display:none;">
        Books are loading, please wait....
    </p>
    <table id="table" border="1" style="display:none;">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>


    
</body>
</html>
